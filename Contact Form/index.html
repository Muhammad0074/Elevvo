<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <!-- Simple page heading -->
      <header class="page-header">
        <h1>Contact Us</h1>
        <p>Fill in the form and we will get back to you shortly.</p>
      </header>

      <!-- Main contact card -->
      <main class="card">
        <!-- Contact form -->
        <form id="contactForm" novalidate>
          <div class="field-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Enter your full name"
              required
            />
            <p class="error-message" data-error-for="fullName"></p>
          </div>

          <div class="field-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@mail.com"
              required
            />
            <p class="error-message" data-error-for="email"></p>
          </div>

          <div class="field-group">
            <label for="subject">Subject</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="Short title for your message"
              required
            />
            <p class="error-message" data-error-for="subject"></p>
          </div>

          <div class="field-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="4"
              placeholder="Type your message here"
              required
            ></textarea>
            <p class="error-message" data-error-for="message"></p>
          </div>

          <button type="submit" class="btn-primary">Send Message</button>
        </form>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
